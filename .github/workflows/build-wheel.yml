name: Build Termux Wheels (Final Fix)

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name (e.g., pydantic-core==2.41.5)'
        required: true
        default: 'pydantic-core==2.41.5'

jobs:
  build-for-termux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Output Folder
        run: |
          mkdir -p ${{ github.workspace }}/output_wheels
          chmod -R 777 ${{ github.workspace }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build Wheel
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            termux/termux-docker:aarch64 \
            bash -c "pkg update -y && \
                     pkg install -y python rust binutils clang make && \
                     export ANDROID_API_LEVEL=24 && \
                     export CARGO_BUILD_TARGET=aarch64-linux-android && \
                     pip wheel ${{ github.event.inputs.package_name }} -w /workspace/output_wheels" || true

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-built-wheel
          path: output_wheels/*.whl
          retention-days: 5
